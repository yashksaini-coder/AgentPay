services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentic_payments
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil", "--host", "0.0.0.0"]
    ports: ["8545:8545"]

volumes:
  pgdata:
