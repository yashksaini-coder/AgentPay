upstream frontend {
    server frontend:3000;
}

upstream backend-a { server backend-a:8080; }
upstream backend-b { server backend-b:8080; }
upstream backend-c { server backend-c:8080; }
upstream backend-d { server backend-d:8080; }
upstream backend-e { server backend-e:8080; }

server {
    listen 80;
    server_name _;

    # Next.js API routes — forward to frontend container as-is
    location /api/agents {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Per-agent WebSocket (must come before per-agent API) ──

    location /api/0/ws {
        rewrite ^/api/0/(.*) /$1 break;
        proxy_pass http://backend-a;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
    location /api/1/ws {
        rewrite ^/api/1/(.*) /$1 break;
        proxy_pass http://backend-b;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
    location /api/2/ws {
        rewrite ^/api/2/(.*) /$1 break;
        proxy_pass http://backend-c;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
    location /api/3/ws {
        rewrite ^/api/3/(.*) /$1 break;
        proxy_pass http://backend-d;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
    location /api/4/ws {
        rewrite ^/api/4/(.*) /$1 break;
        proxy_pass http://backend-e;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # ── Per-agent API (strip /api/{index}/ prefix) ──

    location /api/0/ {
        rewrite ^/api/0/(.*) /$1 break;
        proxy_pass http://backend-a;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/1/ {
        rewrite ^/api/1/(.*) /$1 break;
        proxy_pass http://backend-b;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/2/ {
        rewrite ^/api/2/(.*) /$1 break;
        proxy_pass http://backend-c;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/3/ {
        rewrite ^/api/3/(.*) /$1 break;
        proxy_pass http://backend-d;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/4/ {
        rewrite ^/api/4/(.*) /$1 break;
        proxy_pass http://backend-e;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Default /api/ → backend-a (health checks, etc.) ──

    location /api/ws {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://backend-a;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://backend-a;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else goes to the Next.js frontend
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
